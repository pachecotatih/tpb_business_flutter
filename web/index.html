<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Gestão financeira e negócios para pequenas empresas.">

  <meta name="og:title" content="TPB Business">
  <meta name="og:description" content="Gestão financeira e negócios para pequenas empresas.">
  <meta name="og:image" content="assets/img/tpb_logo1.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TPB Business">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="icons/favicon-96x96.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">

  <title>TPB Business</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="content-loading">
    <img class="logo-img" src="assets/img/tpb_logo1.png" alt="TPB Business">
    <div class="spinner"></div>
  </div>
  <style>
    #content-loading {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
      background-color: #F9FAFB;
    }
    .logo-img {
      width: 500px;
      margin-bottom: 20px;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #F9FAFB;
      border-top: 5px solid #ffc700;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
